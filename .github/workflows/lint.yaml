name: lint

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          src: >-
            pika
            tests
            examples
            utils
