name: lint

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip hatch
          hatch run lint
