name: mypy

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  mypy:
    name: mypy type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install mypy tornado twisted
      - name: Run mypy
        run: python -m mypy
