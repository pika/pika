name: mypy

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  mypy:
    name: mypy type check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip hatch
          hatch run typecheck
